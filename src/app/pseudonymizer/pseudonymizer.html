<div class="main">
  <span class="help">
    Upload an Excel file containing a PESEL column.
    As a result, you will receive a file with the
    same content, but with the PESEL column hashed.
    Additionally, you will receive a separate file
    containing the mapping between the original
    PESEL values and their corresponding hashes.
  </span>

  <div class="form">
    <label for="sheet-no">Sheet number:</label>
    <input id="sheet-no" type="number" [(ngModel)]="sheetNo">
    <label for="col-no">Column number:</label>
    <input id="col-no" type="number" [(ngModel)]="colNo">

    <app-file-upload (fileSelected)="onFileSelected($event)" />
  </div>
</div>

<app-errors [error]="error()"/>
